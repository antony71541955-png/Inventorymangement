services:
  # ── BACKEND (Flask API) ──────────────────────────────────────────────────────
  - type: web
    name: apex-wms-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: FLASK_ENV
        value: production
    disk:
      name: wms-data
      mountPath: /data
      sizeGB: 1

  # ── FRONTEND (Vite/React Static Site) ────────────────────────────────────────
  - type: web
    name: apex-wms-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false   # You'll set this in Render dashboard after backend deploys
